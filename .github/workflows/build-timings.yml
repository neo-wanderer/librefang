name: build-timings

# Weekly compile-hotspot tracker (issue #3311). Runs `cargo build --workspace
# --timings`, parses the per-unit JSON out of cargo's HTML report, persists a
# slim snapshot under bench-results/build-timings/<sha>.json, and diffs against
# the committed `baseline.json`. A regression > 10% on any single crate is
# surfaced as an annotated soft-fail so the artifact still uploads.
#
# `baseline.json` is seeded from the first weekly run's snapshot (committed
# manually after the run completes — the workflow itself never writes back to
# the repo).

on:
  schedule:
    # Mondays 07:00 UTC. After the weekend's quiet period, before the
    # Monday-morning PR rush — fresh data, no contention with active PRs.
    - cron: '0 7 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  collect:
    name: Collect build timings
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: build-timings-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libsecret-1-dev \
            pkg-config
      - name: Ensure dashboard build dir exists
        run: mkdir -p crates/librefang-api/static/react
      - name: Collect snapshot
        run: cargo xtask build-timings
      - name: Compare against baseline
        # Soft-fail: regressions are surfaced via an annotation but do NOT
        # block the workflow — the trend artifact is the primary deliverable.
        # If the team wants hard gating later, flip this to `false`.
        continue-on-error: true
        run: cargo xtask compare-build-timings
      - name: Upload timing snapshot
        uses: actions/upload-artifact@v4
        with:
          name: build-timings-${{ github.sha }}
          path: bench-results/build-timings/
          if-no-files-found: error
          retention-days: 90
