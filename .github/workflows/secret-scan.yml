name: secrets

# Authoritative secret-scanning gate (#5664 sub-finding 4).
#
# Replaces the detect-secrets `.secrets.baseline` diff gate. The old approach
# pinned every known high-entropy string in a 4296-line JSON baseline, so any PR
# that touched a token-shaped fixture had to regenerate the baseline — a
# structural merge-conflict magnet. gitleaks scans the working tree against a
# fixed rule set plus the path / regex allowlists in `.gitleaks.toml`, which
# change far less often. A PR that introduces a real secret (or a new false
# positive not yet allowlisted) fails here so the maintainer never has to chase
# it down post-merge.
#
# The local `scripts/hooks/pre-commit` hook soft-warns when gitleaks is not
# installed; this job is the gate of record.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Pin a specific release so local `gitleaks dir .` and CI agree. Bumping this
  # means re-running the scan locally and allowlisting any new false positives:
  # gitleaks' default ruleset changes between versions (8.21.x flagged docs and
  # test fixtures that 8.30.x's refined defaults correctly skip).
  GITLEAKS_VERSION: 8.30.1

jobs:
  gitleaks:
    name: gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install gitleaks
        # Pin the version and verify the release tarball against gitleaks' own
        # published checksums file before installing, so a tampered or truncated
        # download can't slip a different binary into CI. We download the binary
        # directly rather than using gitleaks-action to avoid its org licensing.
        run: |
          set -euo pipefail
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "${base}/${tarball}" -o "${tarball}"
          curl -sSfL "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt
          grep "  ${tarball}$" checksums.txt | sha256sum -c -
          tar -xzf "${tarball}" gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan working tree
        # `dir` scans files as they exist on disk (not git history), matching
        # what the old `detect-secrets scan` did. A leak exits non-zero and
        # fails the job; --redact keeps the secret value out of the logs.
        run: gitleaks dir . --config .gitleaks.toml --redact --no-banner --verbose

      - name: Verify pre-push hook is present and executable
        # #5664 sub-finding 3 asserts the file exists and stays executable so
        # `git config core.hooksPath scripts/hooks` keeps working after every
        # PR. Cheap to assert here.
        run: test -x scripts/hooks/pre-push
